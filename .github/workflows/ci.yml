name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Ubuntu covers "anyone on a Linux CI box"; macos covers the
        # production developer environment (Apple Silicon training path).
        # We don't install the `train` extra on Linux because mlx is macOS-only.
        os: [ubuntu-latest, macos-14]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        # Skip the `train` extra on Linux (mlx is sys_platform=darwin only).
        # Core + dev + most extras is enough to exercise lint/type/test.
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            uv sync --extra train --extra synth --extra eval
          else
            uv sync --extra synth --extra eval
          fi
        shell: bash

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pyright strict
        run: uv run pyright

      - name: Pytest
        run: uv run pytest -q

      - name: Lockfile in sync
        # Fail if uv.lock drifts from pyproject.toml. Catches the "forgot to
        # re-run uv lock after editing deps" footgun before it lands.
        run: uv lock --check

  link-check:
    name: docs link check
    # Markdown link health gate — catches `#anchor` links that point at
    # renamed headings and relative paths that 404 in the rendered repo.
    # Split into its own job so a flaky lychee run doesn't gate code tests.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lychee link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: |
            --offline
            --no-progress
            --include-fragments
            README.md
            MODEL_CARD.md
            CHANGELOG.md
            CONTRIBUTING.md
            'docs/**/*.md'
          fail: true
