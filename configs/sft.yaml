# Instruction tuning on synthetic + curated SFT pairs.
#
# SFT picks up where CPT left off: the model already knows the vocabulary;
# now it learns the four civic tasks (grounded Q&A, refusal, structured
# extraction, summarization) with citations and a consistent voice.
stage: sft
# Stack on top of the CPT adapter, not the raw 4-bit base. The CPT pass
# is what makes SFT data-efficient at the ~5k-pair scale.
#
# mlx_lm.lora resolves --model as either an HF repo or a local path. The
# CPT adapter path is a relative dir, but mlx_lm needs the base model too;
# we layer the CPT adapter on at run time via --resume-adapter-file (TODO:
# wire through; for the first SFT we use the raw 27B base and treat the
# CPT pass as a separate experiment).
base_model: artifacts/qwen-civic-cpt-fused
data:
  # mlx_lm.lora --data <dir> wants train.jsonl/valid.jsonl in the dir.
  # `civic-slm prepare-sft` writes them under data/sft/sft/ from the
  # raw `data/sft/{jurisdiction}.jsonl` synth output.
  train_path: data/sft/sft/train.jsonl
  valid_path: data/sft/sft/valid.jsonl
  format: chat  # {messages: [{role, content}, ...]} per line

lora:
  # Same scaling story as cpt.yaml: r=32 + num_layers=8 fits the 27B
  # Qwen3.5 hybrid on 128GB; r=64 all-linear overflows Metal.
  rank: 32
  alpha: 64
  dropout: 0.05
  target_modules: all-linear

train:
  # 3 epochs is the floor where citation-following becomes reliable on the
  # held-out factuality eval. 4-5 epochs over-fits on synthetic phrasings.
  epochs: 3
  batch_size: 1
  grad_checkpoint: true
  # CPT runs at 1024 on this base to avoid Metal overflow; SFT prompts are
  # generally shorter than CPT chunks (context + question + answer all in
  # one example), so 2048 fits.
  max_seq_length: 2048
  # 2e-4 is the standard LoRA SFT LR for Qwen 7B. Lower (5e-5) under-shoots
  # in 3 epochs; higher (5e-4) destabilizes within the first few hundred steps.
  learning_rate: 2.0e-4
  lr_schedule: cosine
  # 3% warmup is a small absolute-step count at this data scale; the
  # cosine schedule does most of the work.
  warmup_ratio: 0.03
  # Pack short examples into one max-seq-length window. ~2-3x throughput
  # on a corpus where most examples are well under 4k tokens.
  packing: true
  # See common._TrainSection.num_layers — capped at 8 on this 27B base.
  num_layers: 8

logging:
  project: civic-slm
  steps_per_eval: 50
  steps_per_report: 10
  # Save often so we can pick the best-val checkpoint and so a SIGINT mid-run
  # doesn't lose progress (mlx_lm doesn't flush on signal). 60MB per save at
  # r=32 / num_layers=8 — cheap.
  steps_per_save: 50

output_dir: artifacts/qwen-civic-sft
