# Continued pretraining on raw civic chunks. Surfaces the model to the
# vocabulary and rhythm of municipal documents before any task-specific tuning.
#
# Why CPT before SFT: civic documents share a small set of formatting
# conventions (item numbering, section headers, statute citations, fiscal-
# impact paragraphs) that a generic 7B chat model treats as noise. A short
# CPT pass biases attention toward those patterns so SFT can spend its budget
# on tasks rather than form.
stage: cpt
# 4-bit MLX base. Quantized at the start saves ~12GB unified memory; LoRA
# updates run in fp16 against the quantized base, which is the standard
# MLX-LM CPT path on Apple Silicon.
#
# Pin the upstream HF revision rather than tracking `main` so a silent
# upstream re-quantize cannot move the floor under us. Verify with
# `civic-slm doctor` (planned) or `huggingface-cli download <repo>
# --revision <sha>`. Update this pin only when re-running and re-
# committing the eval baselines.
# mlx_lm.lora resolves --model as either an HF repo or a local path. The LM
# Studio served name `qwen3.6-27b-ud-mlx` is NOT an HF repo id; the real weights
# live at the local LM Studio cache (verified by `ls ~/.lmstudio/models`) which
# corresponds to the HF repo `Brooooooklyn/Qwen3.6-27B-UD-Q6_K_XL-mlx`. Use the
# local path so we don't re-download 27GB to HF cache and so this works offline.
base_model: /Users/duncan/.lmstudio/models/Brooooooklyn/Qwen3.6-27B-UD-Q6_K_XL-mlx
base_model_revision: main  # TODO(v0.2): pin to a 40-char commit SHA before first real CPT
data:
  # mlx_lm.lora --data <dir> expects `train.jsonl` (+ optional `valid.jsonl`)
  # in the directory. `train_path` points at the train file; the trainer
  # wrapper passes `train_path.parent` to mlx_lm.
  train_path: data/processed/cpt/train.jsonl
  valid_path: data/processed/cpt/valid.jsonl
  format: text  # one chunk text per line, mlx_lm.lora text-mode

lora:
  # Rank 32 / alpha 64. Originally configured at 64/128 against a 7B base; the
  # current base is the 27B Qwen3.5-hybrid (linear_attn + self_attn per layer
  # plus MLP) and `all-linear` at r=64 across every projection ran the Metal
  # allocator past the 128GB unified-memory ceiling at batch=1 / seq=2048 on
  # the first training step. r=32 / num_layers=8 (set on the trainer side) is
  # what actually fits this base. Bump back up once we move to a smaller base
  # or a higher-RAM box.
  rank: 32
  alpha: 64
  # Light dropout — CPT runs short and the corpus is already noisy enough
  # via OCR + chunking that we don't need aggressive regularization.
  dropout: 0.05
  # `all-linear` adapts every linear projection (q/k/v/o + MLP) rather than
  # just attention. For domain CPT this matters; the MLPs do most of the
  # vocabulary work.
  target_modules: all-linear

train:
  # 2000 iters * 1024 seq * batch 1 ≈ 2M tokens. Roughly 1-2 epochs over a
  # ~2k-document corpus. Past ~3k iters loss flattens and over-fitting on
  # San Clemente phrasings starts to leak into eval.
  iters: 2000
  # batch_size 1 + grad_checkpoint keeps a 1024-seq run on the 27B base
  # well inside 128GB unified memory.
  batch_size: 1
  grad_checkpoint: true
  # Most civic chunks are < 1500 tokens after our chunker; 1024 still covers
  # the median chunk and is what the 27B base actually fits. Re-evaluate
  # when we move to a smaller base.
  max_seq_length: 1024
  # 1e-5 is conservative for LoRA-on-quantized base. Higher LRs (5e-5+)
  # destabilize the 4-bit base and produce loss spikes by iter ~500.
  learning_rate: 1.0e-5
  lr_schedule: cosine
  # 50 steps ≈ 2.5% of the run; lets the optimizer settle before the
  # cosine ramp-down begins.
  warmup_steps: 50
  # See common._TrainSection.num_layers — capped at 8 on this 27B base.
  num_layers: 8

logging:
  project: civic-slm
  steps_per_eval: 100
  steps_per_report: 10
  steps_per_save: 500

output_dir: artifacts/qwen-civic-cpt
